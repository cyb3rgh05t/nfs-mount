services:
  nfs-mount:
    hostname: "nfs-mount"
    container_name: "nfs-mount"
    image: "ghcr.io/cyb3rgh05t/nfs-mount:latest"
    environment:
      - "PUID=1000"
      - "PGID=1000"
      - "TZ=Europe/Berlin"
      - "JWT_SECRET=change-me-to-a-secure-random-string"
      - "DEFAULT_ADMIN_USER=admin"
      - "DEFAULT_ADMIN_PASS=admin"
      - "API_KEY="
      - "CORS_ORIGINS=https://nfs.deinedomain.com"
      - "DISCORD_WEBHOOK="
      - "TELEGRAM_BOT_TOKEN="
      - "TELEGRAM_CHAT_ID="
      - "TELEGRAM_TOPIC_ID="
      - "SERVER_NAME="
      - "NFS_THREADS=512"
    restart: "unless-stopped"
    network_mode: "host"
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    devices:
      - "/dev/fuse:/dev/fuse"
    volumes:
      - "/opt/appdata/nfs-mount/data:/data"
      - "/opt/appdata/nfs-mount/ssh:/config/ssh"
      - "/mnt:/mnt:rshared"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/hostname:/etc/hostname_host:ro"
      - "/etc/exports:/etc/exports"
